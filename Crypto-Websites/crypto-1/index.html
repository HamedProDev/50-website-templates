<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaEx - Crypto Exchange</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">NovaEx</div>
      <nav class="nav">
        <a href="#" class="nav-item active">Dashboard</a>
        <a href="#" class="nav-item">Exchange</a>
        <a href="#" class="nav-item">Wallet</a>
        <a href="#" class="nav-item">History</a>
        <a href="#" class="nav-item">Markets</a>
      </nav>
      <div class="currency-selector" id="currencySelector">
        <label>Base Currency</label>
        <select id="baseCurrency">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
          <option value="BTC">BTC</option>
        </select>
      </div>
    </aside>
    <main class="main">
      <header class="header">
        <h1>Crypto Exchange</h1>
        <div class="market-ticker">
          <span class="ticker-item">BTC $67,450 <span class="positive">+2.1%</span></span>
          <span class="ticker-item">ETH $3,450 <span class="negative">-1.8%</span></span>
          <span class="ticker-item">SOL $142.30 <span class="positive">+5.6%</span></span>
        </div>
      </header>

      <div class="chart-section card">
        <div class="chart-header">
          <h2>BTC/USD</h2>
          <div class="chart-controls">
            <button class="chart-btn active">1D</button>
            <button class="chart-btn">1W</button>
            <button class="chart-btn">1M</button>
            <button class="chart-btn">1Y</button>
          </div>
        </div>
        <div class="chart-box">
          <canvas id="cryptoChart"></canvas>
        </div>
      </div>

      <div class="exchange-grid">
        <div class="card order-card">
          <div class="card-header">
            <h2>Place Order</h2>
            <div class="order-tabs">
              <button class="order-tab active" id="buyTab">Buy</button>
              <button class="order-tab" id="sellTab">Sell</button>
            </div>
          </div>
          <form id="orderForm" class="order-form">
            <select class="form-input" id="cryptoPair">
              <option value="BTC">BTC/USD</option>
              <option value="ETH">ETH/USD</option>
              <option value="SOL">SOL/USD</option>
              <option value="ADA">ADA/USD</option>
            </select>
            <input type="number" class="form-input" id="orderAmount" placeholder="Amount" min="0.0001" step="any">
            <input type="number" class="form-input" id="orderPrice" placeholder="Price (USD)" step="any">
            <div class="order-total" id="orderTotal">Total: $0.00</div>
            <button type="submit" class="btn btn-success btn-block" id="orderSubmit">Buy BTC</button>
          </form>
        </div>

        <div class="card wallet-card">
          <div class="card-header"><h2>Wallet Balances</h2><a href="#" class="card-link">Deposit</a></div>
          <div id="walletList" class="wallet-list"></div>
        </div>

        <div class="card tx-card">
          <div class="card-header"><h2>Recent Transactions</h2><a href="#" class="card-link">All</a></div>
          <div id="cryptoTxList" class="tx-list"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
